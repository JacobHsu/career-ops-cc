# Portal Scanner Configuration｜求職掃描器設定檔
# Used by /career-ops scan to discover new offers automatically.
# 供 /career-ops scan 指令使用，自動發現新職缺。
#
# Strategy (3 levels)｜掃描策略（三層）:
#   1. Playwright → careers_url of each company (real-time, reliable)
#      直接瀏覽公司職缺頁面（即時、準確）
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#      呼叫 Greenhouse API 取得結構化資料（僅限 Greenhouse 系統）
#   3. WebSearch with site: filters (broad discovery, may be stale)
#      網路搜尋 site: 篩選（廣泛發現，資料可能較舊）
#
# IMPORTANT｜注意: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   優先使用公司自有職缺頁網址；僅在無自有頁面時才用 ATS 系統網址作為備用。
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   例外：若公司無自有頁，ATS 網址可直接使用。
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#   若有自有頁卻使用 ATS 網址，可能產生誤判 410 錯誤（職缺 ID 不符）。
#
# HOW TO CUSTOMIZE｜如何自訂:
#   1. Copy this file to portals.yml in the project root
#      將此檔複製到專案根目錄，命名為 portals.yml
#   2. Edit title_filter.positive with YOUR target role keywords
#      在 title_filter.positive 填入你的目標職缺關鍵字
#   3. Add/remove companies in tracked_companies
#      在 tracked_companies 新增或移除追蹤公司
#   4. Adjust search_queries for your preferred job boards
#      調整 search_queries 以符合你慣用的求職平台
#   5. Set enabled: false on companies you don't care about
#      將不需要的公司設定 enabled: false

# -- Title filter｜職缺標題篩選器 --
# The scanner uses these keywords to decide if a title is relevant.
# 掃描器依此關鍵字判斷職缺標題是否符合目標。
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
# 至少符合 1 個 positive 關鍵字，且不得含任何 negative 關鍵字（不分大小寫）。

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # [自訂] 填入你的目標職缺關鍵字
    # -- 前端工程師 (Frontend Engineer) --
    - "前端工程師"
    - "Frontend Engineer"
    - "Front-End Engineer"
    - "Front End Engineer"
    - "UI Engineer"
    - "UI Developer"
    - "Frontend Developer"
    - "React Engineer"
    - "React Developer"
    - "Vue Engineer"
    - "Vue Developer"
    - "Angular Engineer"
    - "Next.js"
    - "Nuxt"
    # -- 全端工程師 (Fullstack Engineer) --
    - "全端工程師"
    - "全棧工程師"
    - "Full Stack Engineer"
    - "Full-Stack Engineer"
    - "Fullstack Engineer"
    - "Full Stack Developer"
    - "Full-Stack Developer"
    - "Fullstack Developer"
    # -- 相關技術職 --
    - "Software Engineer"
    - "軟體工程師"
    - "Web Engineer"
    - "Web Developer"
    - "Application Engineer"
    - "應用程式工程師"
    - "TypeScript"
    - "JavaScript Engineer"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    # [自訂] 填入你不想看到的職缺關鍵字
    - "Junior"        # 初級職位
    - "Intern"        # 實習生
    - "實習"          # 實習生（中文）
    - "初階"          # 初階職位（中文）
    - ".NET"          # .NET 技術棧
    - "Java "         # Java 技術棧（注意尾部空格，避免誤擋 JavaScript）
    - "iOS"           # 原生行動開發
    - "Android"       # 原生行動開發
    - "PHP"           # PHP 技術棧
    - "Ruby"          # Ruby 技術棧
    - "Embedded"      # 嵌入式系統
    - "Firmware"      # 韌體
    - "FPGA"          # 硬體
    - "ASIC"          # 半導體
    - "研發替代役"
    - "主任"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Hardware Engineer"  # 硬體工程師
    - "IC Design"          # 積體電路設計
  seniority_boost:
    # These prefixes add relevance score but are NOT required to match.
    # 這些前綴會提升相關性分數，但不是必要條件。
    - "資深"       # 台灣最常見的資深前綴
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"

# -- 104 Scanner filters｜104 掃描器進階篩選 --
# Used by scan-104.mjs. Applied after title_filter.
# 由 scan-104.mjs 使用，在 title_filter 之後套用。

filter_104:
  # 地區白名單（空陣列 = 不限）｜Allowed locations (empty = no filter)
  allowed_locations:
    - "台北市"
    - "新北市"


  # 地區黑名單｜Excluded locations
  excluded_locations:
    # [CUSTOMIZE] 通勤太遠的地區填在這裡
    []

  # 遠端/混合工作是否納入｜Include remote/hybrid jobs (remoteWorkType > 0)
  include_remote: true

  # 年薪下限（元）｜Minimum annual salary. 0 = no filter.
  min_salary_annual: 0

  # 是否收「面議」職缺｜Include negotiable salary jobs
  accept_negotiable: true

  # 排除特定公司（模糊比對）｜Exclude companies (fuzzy match)
  exclude_companies:
    # [CUSTOMIZE] 應徵過、不感興趣、或評價差的公司填在這裡
    []

  # 只收近 N 天內刊登的職缺｜Only jobs posted within N days. 0 = no filter.
  max_age_days: 60

  # 104 地區代碼（API 層面過濾，減少抓取量）｜Area codes for 104 API
  # 6001001000 = 台北市, 6001002000 = 新北市, 6001003000 = 桃園市
  # 6001006000 = 新竹市, 6001007000 = 新竹縣
  # 空陣列 = 全台
  areas:
    - "6001001000"  # 台北市
    - "6001002000"  # 新北市

# -- Search queries｜搜尋查詢條件 --
# Each query triggers a WebSearch. Use site: to filter by portal.
# 每筆查詢會觸發一次網路搜尋。使用 site: 限定求職平台。
# The scanner extracts title, URL, and company from results.
# 掃描器從搜尋結果中擷取職缺標題、網址與公司名稱。

search_queries:
  # -- 台灣求職平台 (Taiwan job portals) --

  - name: 104人力銀行 — 前端工程師
    query: 'site:104.com.tw "前端工程師" OR "Frontend Engineer" OR "React工程師" OR "Vue工程師"'
    enabled: true

  - name: 104人力銀行 — 全端工程師
    query: 'site:104.com.tw "全端工程師" OR "Full Stack Engineer" OR "Fullstack Engineer" OR "全棧工程師"'
    enabled: true

  - name: 104人力銀行 — 資深前端/全端
    query: 'site:104.com.tw "資深前端" OR "資深全端" OR "Senior Frontend" OR "Senior Full Stack"'
    enabled: true

  - name: CakeResume — Frontend Engineer
    query: 'site:www.cakeresume.com/jobs "Frontend Engineer" OR "前端工程師" OR "React Engineer" OR "Vue Engineer" OR "Next.js"'
    enabled: true

  - name: CakeResume — Fullstack Engineer
    query: 'site:www.cakeresume.com/jobs "Full Stack Engineer" OR "Fullstack Engineer" OR "全端工程師" OR "Full-Stack Developer"'
    enabled: true

  - name: CakeResume — 資深/Senior 前端全端
    query: 'site:www.cakeresume.com/jobs "Senior Frontend" OR "Senior Fullstack" OR "資深前端" OR "資深全端" OR "Lead Frontend"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Frontend Engineer
    query: 'site:jobs.ashbyhq.com "Frontend Engineer" OR "Front-End Engineer" OR "React Engineer" OR "UI Engineer" remote'
    enabled: true

  - name: Ashby — Fullstack Engineer
    query: 'site:jobs.ashbyhq.com "Full Stack Engineer" OR "Fullstack Engineer" OR "Full-Stack Developer" remote'
    enabled: true

  - name: Ashby — Software Engineer (Web)
    query: 'site:jobs.ashbyhq.com "Software Engineer" "React" OR "Vue" OR "TypeScript" OR "Next.js" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Frontend Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Frontend Engineer" OR "Front-End Engineer" OR "React Engineer" remote'
    enabled: true

  - name: Greenhouse — Fullstack Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack Engineer" OR "Fullstack Engineer" OR "Full-Stack Developer" remote'
    enabled: true

  - name: Greenhouse — Software Engineer (Web)
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" "React" OR "TypeScript" OR "Next.js" OR "Vue" remote'
    enabled: true

  # -- Workable --
  - name: Workable — Frontend/Fullstack
    query: 'site:apply.workable.com "Frontend Engineer" OR "Fullstack Engineer" OR "Full Stack Engineer" OR "React Engineer" remote'
    enabled: true

  # -- Global remote boards｜全球遠端求職平台 --

  - name: WeWorkRemotely — Frontend/Fullstack
    query: 'site:weworkremotely.com "Frontend Engineer" OR "Full Stack Engineer" OR "React Engineer" OR "Fullstack Developer"'
    enabled: true

  - name: Working Nomads — Frontend/Fullstack
    query: 'site:workingnomads.com "Frontend Engineer" OR "Full Stack Engineer" OR "React Developer" OR "Vue Developer"'
    enabled: true

  - name: RemoteOK — Frontend/Fullstack
    query: 'site:remoteok.com "Frontend Engineer" OR "Fullstack Engineer" OR "React Engineer" OR "TypeScript Engineer"'
    enabled: true

  - name: Remotive — Frontend/Fullstack
    query: 'site:remotive.com "Frontend Engineer" OR "Full Stack Engineer" OR "React Engineer" OR "Vue Engineer" remote'
    enabled: true

  # -- YC / Startup boards｜新創公司求職平台 --

  - name: YC Jobs — Frontend/Fullstack
    query: 'site:ycombinator.com/jobs OR site:workatastartup.com "Frontend Engineer" OR "Full Stack Engineer" OR "Fullstack Engineer" OR "React Engineer" remote'
    enabled: true

  # -- Global aggregators｜全球聚合平台 --

  - name: Himalayas — Frontend/Fullstack remote
    query: 'site:himalayas.app "Frontend Engineer" OR "Full Stack Engineer" OR "Fullstack Engineer" OR "React Engineer" remote'
    enabled: true

  - name: HN Who's Hiring — Frontend/Fullstack
    query: 'site:news.ycombinator.com OR site:hnrss.org "Frontend Engineer" OR "Full Stack Engineer" OR "React" OR "TypeScript" remote'
    enabled: true

# -- Tracked companies｜直接追蹤公司職缺頁 --
# Companies whose career pages are checked directly.
# 直接掃描公司官方職缺頁，取得最即時的職缺資訊。
# scan_method: playwright (default), websearch, greenhouse_api
# For Greenhouse companies, add api: field for faster structured JSON access.
# Greenhouse 公司可加 api: 欄位，以更快取得結構化職缺資料。

tracked_companies:

  # -- 台灣辦事處外商 (Foreign companies with Taiwan office) --
  # 僅列出已確認在台灣設有辦公室的外商，優先考慮在地招募機會。

  - name: Salesforce
    careers_url: https://careers.salesforce.com
    scan_method: websearch
    scan_query: 'site:careers.salesforce.com "Frontend Engineer" OR "Software Engineer" OR "Full Stack" Taiwan OR "Taipei"'
    notes: "台北 101 大樓 57F 辦公室。NYSE: CRM。有台灣在地招募。"
    enabled: true
